version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qoima}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qoima_secret}
      POSTGRES_DB: ${POSTGRES_DB:-qoima_crm}
    ports:
      - "5439:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qoima -d qoima_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-qoima}:${POSTGRES_PASSWORD:-qoima_secret}@db:5432/${POSTGRES_DB:-qoima_crm}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-qoima}:${POSTGRES_PASSWORD:-qoima_secret}@db:5432/${POSTGRES_DB:-qoima_crm}
      SECRET_KEY: ${SECRET_KEY:-super-secret-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    depends_on:
      - backend

volumes:
  pgdata:
